<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account – SkillGap AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">⚡</div>
      <span>SkillGap AI</span>
    </div>

    <h2 class="auth-title">Create your account</h2>
    <p class="auth-sub">Join SkillGap AI and start bridging your career gap today</p>

    {% if error %}
    <div class="alert-error"><i class="fa-solid fa-circle-xmark"></i> {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-field">
        <label class="form-label"><i class="fa-solid fa-user"></i> Full Name</label>
        <input type="text" name="name" placeholder="Your full name" required>
      </div>
      <div class="form-field">
        <label class="form-label"><i class="fa-solid fa-envelope"></i> Email</label>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-field">
        <label class="form-label"><i class="fa-solid fa-lock"></i> Password</label>
        <input type="password" name="password" placeholder="Create a strong password" required>
      </div>
      <button type="submit" class="btn-submit">
        <i class="fa-solid fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>

  </div>

</body>
</html>
