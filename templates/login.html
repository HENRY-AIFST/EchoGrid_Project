<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In – SkillGap AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">⚡</div>
      <span>SkillGap AI</span>
    </div>

    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Sign in to save and track your skill gap analyses</p>

    {% if error %}
    <div class="alert-error"><i class="fa-solid fa-circle-xmark"></i> {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-field">
        <label class="form-label"><i class="fa-solid fa-envelope"></i> Email</label>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-field">
        <label class="form-label"><i class="fa-solid fa-lock"></i> Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-submit">
        <i class="fa-solid fa-right-to-bracket"></i> Sign In
      </button>
    </form>

    <div class="oauth-divider"><span>or</span></div>

    <a href="/google/login" class="google-btn">
      <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google Logo" width="20" height="20">
      Sign in with Google
    </a>

    <div class="auth-footer">
      Don't have an account? <a href="/register">Create one free</a>
    </div>

  </div>

</body>
</html>
