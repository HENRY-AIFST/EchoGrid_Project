  <body>
    <script>
      // Apply theme before React renders to prevent flash
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'light') {
          document.documentElement.classList.add('light');
        } else {
          document.documentElement.classList.remove('light');
        }
      })();
    </script>
